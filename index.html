<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中...</title>
    <!-- FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="page-title">我的导航</h1>
            
            <div class="mode-switch">
                <span class="switch-label" id="label-lan">内网</span>
                <label class="toggle-wrapper">
                    <input type="checkbox" id="mode-toggle" class="toggle-checkbox">
                    <div class="toggle-slider"></div>
                </label>
                <span class="switch-label" id="label-wan">外网</span>
            </div>
        </header>

        <main id="categories-container">
            <!-- 内容将由 JavaScript 动态生成 -->
        </main>

        <footer>
            <p>&copy; 2025 Home Lab Navigation</p>
        </footer>
    </div>

    <!-- 配置文件 (必须在 script.js 之前加载) -->
    <script src="config.js"></script>
    <!-- 逻辑脚本 -->
    <script src="script.js"></script>
</body>
</html>
